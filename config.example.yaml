database:
  enabled: true
  type: sqlite
  sqlite:
    path: "./data/app.db"
  show_sql: false
log:
  level: debug # 日志等级  debug,info,waring,error
  filename: ./logs/sms.log

server:
  addr: "0.0.0.0:8080"
  ip_extractor: "X-Real-IP"

App:
  # JWT配置
  JWT:
    # 随机生成一个 32 字节的字符串，推荐使用 openssl rand -base64 32 生成
    Secret: ""
    ExpiresHours: 168 # 7天
  Users:
    # 使用 Bcrypt 加密，默认密码为 admin123，建议首次登录后修改密码，搜索 bcrypt在线加密网站 即可
    admin: "$2y$12$7DXcOiX1D59xNTIn5riUKusAPLP88LxxoczWmUT83MBj5EFznbp8a"
  OIDC:
    Enabled: false
    Issuer: ""
    ClientID: ""
    ClientSecret: ""
    RedirectURL: "http://localhost:8080/oidc/callback"

  # 串口配置
  Serial:
    # 单模块兼容配置。未配置 Modules 时会使用这里的串口。
    Port: ""
  # 多模块配置。配置后会忽略上面的 Serial.Port，并为每个模块启动独立串口服务。
  Modules:
    - ID: "sim1"
      Name: "短信模块 1"
      # 建议使用 /dev/serial/by-id/... 固定路径，避免重启后 ttyACM 编号变化。
      Port: "/dev/serial/by-id/usb-AirM2M_AirM2M_Compo_000000000001-if06"
    # - ID: "sim2"
    #   Name: "短信模块 2"
    #   Port: "/dev/serial/by-id/..."
    #   Disabled: false
  Scheduler:
    # 必填：流量保活任务使用的固定静态文件。建议自建约 4 KB 的 HTTP 文件，减少 TLS 额外流量。
    TrafficEndpoint: "http://your-server.example/uart-traffic/payload.bin"
