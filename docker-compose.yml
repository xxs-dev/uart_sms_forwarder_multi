services:
  uart_sms_forwarder:
    image: ghcr.io/xxs-dev/uart_sms_forwarder_multi:1.3.0-multi.1
    container_name: uart_sms_forwarder
    restart: unless-stopped

    ports:
      # 映射 8080 端口到主机
      - "8080:8080"

    volumes:
      # 持久化数据目录
      - ./data:/app/data
      # 持久化日志目录
      - ./logs:/app/logs
      # 挂载配置文件（首次运行前需要创建此文件）
      - ./config.yaml:/app/config.yaml

    # 为每个模块映射稳定串口路径；请按本机 /dev/serial/by-id 的实际结果修改。
    # devices:
    #   - /dev/serial/by-id/usb-module-1:/dev/ttySMS1
    #   - /dev/serial/by-id/usb-module-2:/dev/ttySMS2

    environment:
      - TZ=Asia/Shanghai
